<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>投递到我们的小宇宙</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base: #f4f1f2;
      --text-main: #3f353b;
      --text-sec: #8c7d84;
      --accent-pink: #b9879b;
      --accent-soft: #efe5e8;
      --glass: rgba(255,255,255,0.56);
      --line: rgba(255,255,255,0.82);
    }

    * { box-sizing: border-box; }

    html, body, * {
      cursor: url('x-0.jpg') 16 16, auto !important;
    }

    button:hover,
    label:hover,
    a:hover {
      cursor: url('0-1.jpg') 16 16, auto !important;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif;
      color: var(--text-main);
      overflow-x: hidden;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.72), transparent 34%),
        radial-gradient(circle at bottom right, rgba(222,208,214,0.24), transparent 30%),
        linear-gradient(180deg, #f4f1f2 0%, #efe8eb 52%, #f6f2f3 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.5), transparent 20%),
        radial-gradient(circle at 80% 10%, rgba(233,223,228,0.55), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.5), transparent 28%);
      pointer-events: none;
      z-index: -1;
    }

    .page-shell {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 80px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      margin-bottom: 22px;
      border-radius: 999px;
      color: #9b7d8c;
      text-decoration: none;
      font-size: 13px;
      background: rgba(255,255,255,0.58);
      border: 1px solid rgba(255,255,255,0.86);
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 32px rgba(25,20,30,0.05);
    }

    .upload-card {
      position: relative;
      overflow: hidden;
      border-radius: 46px;
      padding: clamp(30px, 6vw, 64px);
      background: rgba(255,255,255,0.48);
      border: 1px solid rgba(255,255,255,0.76);
      box-shadow: 0 40px 120px rgba(18,14,16,0.07), inset 0 1px 0 rgba(255,255,255,0.82);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      text-align: center;
    }

    .upload-card::before {
      content: '';
      position: absolute;
      width: 420px;
      height: 420px;
      right: -180px;
      top: -180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,214,228,0.36), transparent 72%);
      filter: blur(30px);
      pointer-events: none;
    }

    .kitty-icon {
      width: 82px;
      height: auto;
      margin-bottom: 20px;
      filter: drop-shadow(0 12px 24px rgba(185,135,155,0.22));
      animation: float 4s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .card-tag {
      width: fit-content;
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(255,255,255,0.92);
      color: var(--accent-pink);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.8px;
      margin-bottom: 20px;
      box-shadow: 0 10px 22px rgba(255,45,85,0.06);
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 0;
      font-family: 'Playfair Display', 'Noto Sans SC', serif;
      font-size: clamp(42px, 8vw, 76px);
      line-height: 1;
      font-weight: 600;
      letter-spacing: -2px;
      color: #43373d;
      position: relative;
      z-index: 1;
    }

    .desc {
      max-width: 620px;
      margin: 24px auto 30px;
      color: #75666d;
      font-size: 15px;
      line-height: 2;
      position: relative;
      z-index: 1;
    }

    .form-area {
      position: relative;
      z-index: 1;
      max-width: 620px;
      margin: 0 auto;
      text-align: left;
    }

    .love-input,
    .love-textarea {
      width: 100%;
      display: block;
      margin: 16px auto;
      border: 1px solid rgba(185,135,155,0.18);
      background: rgba(255,255,255,0.72);
      border-radius: 24px;
      padding: 15px 18px;
      outline: none;
      font-family: inherit;
      color: var(--text-main);
      box-shadow: 0 8px 20px rgba(185,135,155,0.04);
      transition: 0.28s ease;
    }

    .love-input:focus,
    .love-textarea:focus {
      border-color: rgba(185,135,155,0.42);
      box-shadow: 0 12px 26px rgba(185,135,155,0.09);
      background: rgba(255,255,255,0.86);
    }

    .love-textarea {
      min-height: 136px;
      resize: vertical;
      line-height: 1.8;
    }

    .upload-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin: 22px 0;
    }

    .upload-btn,
    .submit-love-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 24px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #b9879b, #d8a5ba);
      color: #fff;
      font-weight: 700;
      font-family: inherit;
      box-shadow: 0 16px 32px rgba(185,135,155,0.2);
      transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
    }

    .upload-btn:hover,
    .submit-love-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 42px rgba(185,135,155,0.26);
    }

    .submit-love-btn:disabled {
      opacity: 0.58;
      transform: none;
    }

    .preview-box {
      margin: 24px auto 0;
      width: 100%;
      min-height: 280px;
      border-radius: 30px;
      background: rgba(255,255,255,0.58);
      border: 1px dashed rgba(185,135,155,0.32);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #9b7d8c;
      text-align: center;
      padding: 16px;
    }

    .preview-box img {
      width: 100%;
      height: 100%;
      max-height: 480px;
      object-fit: contain;
      border-radius: 22px;
      display: block;
    }

    .upload-status {
      min-height: 26px;
      margin-top: 18px;
      color: var(--accent-pink);
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      line-height: 1.8;
    }

    .setup-warning {
      margin: 22px auto 0;
      max-width: 620px;
      border-radius: 24px;
      padding: 16px 18px;
      color: #8d6f7b;
      font-size: 13px;
      line-height: 1.8;
      background: rgba(255,255,255,0.54);
      border: 1px solid rgba(255,255,255,0.82);
      text-align: left;
    }

    .heart-trail {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 9999;
      pointer-events: none;
      font-size: 15px;
      color: rgba(185,135,155,0.82);
      transform: translate(-50%, -50%);
      animation: heartFloat 0.9s ease-out forwards;
      filter: drop-shadow(0 6px 12px rgba(255,182,203,0.28));
    }

    @keyframes heartFloat {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(0.9) rotate(0deg); }
      100% { opacity: 0; transform: translate(-50%, -92px) scale(1.8) rotate(18deg); }
    }

    @media (max-width: 640px) {
      .page-shell { width: min(100% - 24px, 960px); padding-top: 24px; }
      .upload-card { border-radius: 34px; padding: 28px 18px 34px; }
      .preview-box { min-height: 230px; }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <a class="back-link" href="index.html">← 回到 520 小宇宙</a>

    <section class="upload-card">
      <img class="kitty-icon" src="0-2.png" alt="凯蒂猫" onerror="this.src='https://api.iconify.design/twemoji/cat-face.svg'" />
      <div class="card-tag">Secret Upload</div>
      <h1>投递到我们的小宇宙</h1>
      <p class="desc">宝宝可以在这里上传一张照片，也可以写一句想对臭臭说的话。点下投递之后，它会被保存到 Supabase 里。</p>

      <div class="form-area">
        <input class="love-input" id="nicknameInput" placeholder="你的昵称，比如：瑰色宝宝" />
        <textarea class="love-textarea" id="messageInput" placeholder="写一句想对臭臭说的话"></textarea>

        <div class="upload-actions">
          <label class="upload-btn">
            选择照片
            <input type="file" accept="image/*" id="photoUpload" hidden />
          </label>
          <button class="submit-love-btn" id="submitBtn" onclick="submitLoveMemory()">投递到我们的小宇宙</button>
        </div>

        <div class="preview-box" id="previewBox">
          <span>照片会出现在这里</span>
        </div>

        <div class="upload-status" id="uploadStatus"></div>
      </div>

      <div class="setup-warning" id="setupWarning">
        还需要把 SUPABASE_URL 和 SUPABASE_ANON_KEY 替换成你自己的 Supabase 配置。不要填写 service_role key。
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "PASTE_YOUR_SUPABASE_PROJECT_URL_HERE";
    const SUPABASE_ANON_KEY = "PASTE_YOUR_SUPABASE_ANON_PUBLIC_KEY_HERE";
    const BUCKET_NAME = "love-uploads";
    const TABLE_NAME = "love_messages";

    const isSupabaseConfigured =
      SUPABASE_URL &&
      SUPABASE_ANON_KEY &&
      !SUPABASE_URL.includes('PASTE_YOUR') &&
      !SUPABASE_ANON_KEY.includes('PASTE_YOUR');

    const supabaseClient = isSupabaseConfigured
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null;

    const photoUpload = document.getElementById('photoUpload');
    const previewBox = document.getElementById('previewBox');
    const uploadStatus = document.getElementById('uploadStatus');
    const submitBtn = document.getElementById('submitBtn');
    const setupWarning = document.getElementById('setupWarning');

    let selectedPhotoFile = null;

    if (!isSupabaseConfigured) {
      uploadStatus.innerText = '当前还是演示版：需要先配置 Supabase URL 和 anon key。';
    } else {
      setupWarning.style.display = 'none';
    }

    photoUpload.addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;

      if (!file.type.startsWith('image/')) {
        uploadStatus.innerText = '宝宝，只能上传图片哦。';
        this.value = '';
        return;
      }

      if (file.size > 6 * 1024 * 1024) {
        uploadStatus.innerText = '这张照片有点大，建议压缩到 6MB 以内再上传。';
        this.value = '';
        return;
      }

      selectedPhotoFile = file;

      const reader = new FileReader();
      reader.onload = function (e) {
        previewBox.innerHTML = `<img src="${e.target.result}" alt="Uploaded Memory">`;
      };
      reader.readAsDataURL(file);
    });

    async function submitLoveMemory() {
      const nickname = document.getElementById('nicknameInput').value.trim();
      const message = document.getElementById('messageInput').value.trim();

      if (!nickname && !message && !selectedPhotoFile) {
        uploadStatus.innerText = '宝宝，至少写一句话或者上传一张照片哦。';
        return;
      }

      if (!isSupabaseConfigured || !supabaseClient) {
        uploadStatus.innerText = '还没有配置 Supabase，暂时不能真正保存。';
        return;
      }

      submitBtn.disabled = true;
      uploadStatus.innerText = '正在投递到我们的小宇宙...';

      let photoPath = null;
      let photoUrl = null;

      try {
        if (selectedPhotoFile) {
          const rawExt = selectedPhotoFile.name.split('.').pop() || 'jpg';
          const fileExt = rawExt.toLowerCase().replace(/[^a-z0-9]/g, '') || 'jpg';
          const fileName = `${Date.now()}-${Math.random().toString(36).slice(2)}.${fileExt}`;
          photoPath = `memories/${fileName}`;

          const { error: uploadError } = await supabaseClient
            .storage
            .from(BUCKET_NAME)
            .upload(photoPath, selectedPhotoFile, {
              cacheControl: '3600',
              upsert: false
            });

          if (uploadError) throw uploadError;

          const { data: publicUrlData } = supabaseClient
            .storage
            .from(BUCKET_NAME)
            .getPublicUrl(photoPath);

          photoUrl = publicUrlData.publicUrl;
        }

        const { error: insertError } = await supabaseClient
          .from(TABLE_NAME)
          .insert([
            {
              nickname: nickname || '瑰色宝宝',
              message: message || '她上传了一张照片，没有留下文字。',
              photo_path: photoPath,
              photo_url: photoUrl
            }
          ]);

        if (insertError) throw insertError;

        uploadStatus.innerText = '投递成功啦，已经保存到我们的小宇宙 💗';
        document.getElementById('nicknameInput').value = '';
        document.getElementById('messageInput').value = '';
        photoUpload.value = '';
        selectedPhotoFile = null;
        previewBox.innerHTML = '<span>照片会出现在这里</span>';
        spawnLoveHearts();
      } catch (error) {
        console.error(error);
        uploadStatus.innerText = '投递失败了，可能是 Supabase 表、Storage 或 RLS 权限还没配置好。';
      } finally {
        submitBtn.disabled = false;
      }
    }

    function spawnLoveHearts() {
      for (let i = 0; i < 18; i++) {
        setTimeout(() => {
          const heart = document.createElement('div');
          heart.className = 'heart-trail';
          heart.textContent = Math.random() > 0.5 ? '♡' : '♥';
          heart.style.left = `${40 + Math.random() * 20}vw`;
          heart.style.top = `${58 + Math.random() * 12}vh`;
          document.body.appendChild(heart);
          setTimeout(() => heart.remove(), 900);
        }, i * 45);
      }
    }

    let lastHeartTime = 0;
    document.addEventListener('mousemove', event => {
      const now = Date.now();
      if (now - lastHeartTime < 90) return;
      lastHeartTime = now;
      const heart = document.createElement('div');
      heart.className = 'heart-trail';
      heart.textContent = Math.random() > 0.5 ? '♡' : '♥';
      heart.style.left = event.clientX + 'px';
      heart.style.top = event.clientY + 'px';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 900);
    });
  </script>
</body>
</html>
